version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ikBZos7lEYVyGd_oNKkdkQ
      MSSQL_PID: Express
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ikBZos7lEYVyGd_oNKkdkQ -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - postventa-network

  # Redis for Celery and Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - postventa-network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.sqlserver
    environment:
      - DEBUG=False
      - SECRET_KEY=MDqUwcHCWfVRib_l65f14s8pZVrJ1nye_3Wt8U6JWQ4reWvMdNg0_bz_MncC8mlJVqA
      - DB_NAME=postventa_system
      - DB_USER=sa
      - DB_PASSWORD=ikBZos7lEYVyGd_oNKkdkQ
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - REDIS_URL=redis://redis:6379/0
      - SHARED_FOLDER_PATH=/shared
    volumes:
      - ./backend:/app
      - shared_data:/shared
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - postventa-network

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.sqlserver
    environment:
      - DEBUG=False
      - SECRET_KEY=MDqUwcHCWfVRib_l65f14s8pZVrJ1nye_3Wt8U6JWQ4reWvMdNg0_bz_MncC8mlJVqA
      - DB_NAME=postventa_system
      - DB_USER=sa
      - DB_PASSWORD=ikBZos7lEYVyGd_oNKkdkQ
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - REDIS_URL=redis://redis:6379/0
      - SHARED_FOLDER_PATH=/shared
    volumes:
      - ./backend:/app
      - shared_data:/shared
      - celery_logs:/app/logs
    command: celery -A postventa_system worker --loglevel=info
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - postventa-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.sqlserver
    environment:
      - DEBUG=False
      - SECRET_KEY=MDqUwcHCWfVRib_l65f14s8pZVrJ1nye_3Wt8U6JWQ4reWvMdNg0_bz_MncC8mlJVqA
      - DB_NAME=postventa_system
      - DB_USER=sa
      - DB_PASSWORD=ikBZos7lEYVyGd_oNKkdkQ
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - REDIS_URL=redis://redis:6379/0
      - SHARED_FOLDER_PATH=/shared
    volumes:
      - ./backend:/app
      - shared_data:/shared
      - celery_beat_logs:/app/logs
    command: celery -A postventa_system beat --loglevel=info
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - postventa-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - postventa-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - postventa-network

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local
  shared_data:
    driver: local
  backend_logs:
    driver: local
  celery_logs:
    driver: local
  celery_beat_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  postventa-network:
    driver: bridge