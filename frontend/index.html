  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Development helper: unregister service workers on localhost to avoid cached SW errors -->
    <script>
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (const reg of regs) {
              try {
                reg.unregister();
                console.log('Unregistered service worker:', reg);
              } catch (e) {
                console.warn('Failed to unregister service worker', e);
              }
            }
          }).catch(err => console.warn('Error fetching service worker registrations', err));
        }
      }
    </script>
  </body>
